<template>
    <lightning-card>
    <lightning-layout>
        <lightning-layout-item padding="around-small" >
            <div class="header-column">
                <lightning-tile label="Account" type="media">
                    <lightning-icon slot="media" icon-name="standard:account"></lightning-icon>
                    <p class="field-title" title="Field 1">Account </p>
                </lightning-tile>
            </div>
        </lightning-layout-item>
        <lightning-layout-item alignment-bump="right">
        <lightning-button-stateful
            label-when-off="Follow"
            label-when-on="Following"
            label-when-hover="Unfollow"
            icon-name-when-off="utility:add"
            icon-name-when-on="utility:check"
            icon-name-when-hover="utility:close"
            selected={isSelected}
            onclick={handleClick}>
        </lightning-button-stateful>
            <lightning-button label="New Contact" ></lightning-button>
            <lightning-button label="New Case" ></lightning-button>
            <lightning-button label="New Note" icon-name="utility:save"></lightning-button>
            <lightning-button-menu alternative-text="Show menu" variant="border-filled">
                <lightning-menu-item label="Menu Item One" value="item1"></lightning-menu-item>
                <lightning-menu-item label="Menu Item Two" value="item2"></lightning-menu-item>
                <lightning-menu-item label="Menu Item Three" value="item3"></lightning-menu-item>
            </lightning-button-menu>
    </lightning-layout-item>
    </lightning-layout>

    <lightning-layout>
        <lightning-layout-item padding="around-small">
            <div class="header-column">
                <p class="field-title" title="Field 1">Type </p>
                
            </div>
        </lightning-layout-item>
        <lightning-layout-item padding="around-small">
            <div class="header-column">
                <p class="field-title" title="Field 2 (3)"> Phone
                    
                </p>
                
            </div>
        </lightning-layout-item>
            <lightning-layout-item padding="around-small">
            <div class="header-column">
                <p class="field-title" title="Field 3">Website </p>
                
            </div>
        </lightning-layout-item>
        
        <lightning-layout-item padding="around-small">
            <div class="header-column">
                <p class="field-title" title="Field 4"> Account Owner</p>
                <a href="#">Vaitheeshwari E</a>
            </div>
        </lightning-layout-item>
        <lightning-layout-item padding="around-small">
        <div class="header-column">
            <p class="field-title" title="Field 5">Account site </p>
            
        </div>
        </lightning-layout-item>
    <lightning-layout-item padding="around-small">
        <div class="header-column">
            <p class="field-title" title="Field 6">Industry </p>
            
        </div>
    </lightning-layout-item>
    </lightning-layout>
</lightning-card>
</template>
