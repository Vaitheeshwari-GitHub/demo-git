<template>
    <lightning-card>
    <lightning-tabset >

    <lightning-input type="text" label="Enter Notification Body" placeholder="type here..." onchange={handleBody}></lightning-input>
    <template if:true={showNotificationTypePicklist}>
        <lightning-combobox name="notificationtype" label="Select Notification Type" placeholder="Select Notification type"
        options={notificationOptions} onchange={handleNotificationTypeChange}></lightning-combobox>
    </template>
    <div class="slds-m-vertical_medium">
        <lightning-button variant="brand" label="Send Notification" title="Send Custom Notification" onclick={handleClick1} class="slds-m-left_x-small"></lightning-button>
    </div>
        </lightning-tab>
        <lightning-tab label="Tab2">

    <lightning-input type="text" label="Enter Notification Body" placeholder="type here..." onchange={handleBody}></lightning-input>

        options={notificationOptions} onchange={handleNotificationTypeChange}></lightning-combobox>

    <div class="slds-m-vertical_medium">
        <lightning-button variant="brand" label="Send Notification" title="Send Custom Notification" onclick={handleClick2} class="slds-m-left_x-small"></lightning-button>
    </div>
        </lightning-tab>
        <lightning-tab label="Tab3">

    <template if:true={showNotificationTypePicklist}>

        </lightning-tab>

</lightning-card>
</template>
