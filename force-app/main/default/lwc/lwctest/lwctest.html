<template>
    <lightning-card title="Display basic record data" icon-name="custom:custom107">
         <div class="slds-m-around_medium">
            <p> <b>This is lightning-record-form </b> </p>
            <lightning-record-form
                record-id={recordId}
                object-api-name={objectApiName}
                fields={fields}>
            </lightning-record-form>
        </div>
        <div class="slds-p-around_medium">
            <p> <b> This is lightning-record-view-form </b> </p>
        <lightning-record-view-form record-id={recordId} object-api-name={objectApiName} density="compact">
                                                    <lightning-output-field    field-name="AccountId"></lightning-output-field>
                                                    <lightning-output-field  field-name="Name"></lightning-output-field>
                                                    <lightning-output-field   field-name="Phone"></lightning-output-field>
                                                    <lightning-output-field   field-name="Website"></lightning-output-field>
                                                    <lightning-output-field     field-name="Industry"></lightning-output-field>
                                                </lightning-record-view-form>
        </div>
    </lightning-card>
  </template>
